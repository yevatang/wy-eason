<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eason 生日签抽卡机</title>
    <!-- 本地依赖（全部离线可用，无需网络） -->
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/three.r128.min.js"></script>
    <script src="vendor/OrbitControls.js"></script>
    <script src="vendor/gsap.min.js"></script>

    <style>
        html, body, #root { width: 100%; height: 100%; }
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #020610; }

        /* --- 暗场歌词背景 --- */
        #gradient-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: 0;
            isolation: isolate;
            background:
                radial-gradient(circle at 18% 22%, rgba(75, 189, 197, 0.08), transparent 30%),
                radial-gradient(circle at 84% 78%, rgba(88, 123, 181, 0.08), transparent 34%),
                linear-gradient(180deg, #050812 0%, #07111d 46%, #030711 100%);
        }

        #gradient-bg::before {
            display: none;
        }

        #gradient-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 50%, transparent 0 25%, rgba(0, 0, 0, 0.04) 34%, rgba(0, 0, 0, 0.58) 100%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 4px);
            opacity: 0.82;
        }

        .orb {
            display: none;
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 1;
            border-radius: 50%;
            mix-blend-mode: screen;
            pointer-events: none;
            will-change: transform, opacity, filter;
        }

        .orb-1 {
            width: clamp(300px, 45vw, 560px);
            height: clamp(300px, 45vw, 560px);
            background:
                repeating-conic-gradient(
                    from -12deg,
                    rgba(240, 248, 250, 0.96) 0deg 1.05deg,
                    transparent 1.05deg 3.55deg,
                    rgba(184, 205, 211, 0.66) 3.55deg 4.2deg,
                    transparent 4.2deg 6.4deg
                );
            -webkit-mask-image: radial-gradient(circle, transparent 0 53%, rgba(0,0,0,0.52) 53.4% 56.4%, #000 57% 67%, transparent 67.6% 100%);
            mask-image: radial-gradient(circle, transparent 0 53%, rgba(0,0,0,0.52) 53.4% 56.4%, #000 57% 67%, transparent 67.6% 100%);
            opacity: 0.62;
            filter: drop-shadow(0 0 18px rgba(199, 239, 248, 0.22));
            animation: audioWaveOuter 1.7s ease-in-out infinite;
        }

        .orb-2 {
            width: clamp(210px, 29vw, 348px);
            height: clamp(210px, 29vw, 348px);
            border: 1px dashed rgba(234, 243, 245, 0.58);
            opacity: 0.58;
            animation: audioRingBreath 2.7s ease-in-out infinite;
        }

        .orb-3 {
            width: clamp(98px, 13vw, 146px);
            height: clamp(98px, 13vw, 146px);
            border: 1px solid rgba(236, 246, 248, 0.62);
            background:
                radial-gradient(circle, rgba(255, 78, 78, 0.1) 0 11%, transparent 12%),
                radial-gradient(circle, transparent 0 52%, rgba(236, 246, 248, 0.13) 53%, transparent 54%);
            opacity: 0.72;
            animation: audioInnerRing 2.1s ease-in-out infinite;
        }

        .orb-4 {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: #ff4f52;
            box-shadow:
                0 0 0 10px rgba(255, 79, 82, 0.04),
                0 0 22px rgba(255, 79, 82, 0.58);
            opacity: 0.95;
            animation: audioCorePulse 1.5s ease-in-out infinite;
        }

        .lyrics-layer {
            position: absolute;
            inset: 0;
            z-index: 12;
            overflow: hidden;
            pointer-events: none;
            mix-blend-mode: normal;
            perspective: 860px;
            perspective-origin: 50% 44%;
            transform-style: preserve-3d;
        }

        .lyric-line {
            position: absolute;
            top: -22vh;
            white-space: nowrap;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            font-family: "Courier New", Courier, monospace;
            font-size: clamp(32px, var(--lyric-size, 4.5vw), 96px);
            color: rgba(127, 229, 237, 0.78);
            text-shadow:
                0 1px 0 rgba(1, 6, 12, 0.42),
                0 0 8px rgba(87, 226, 213, 0.72),
                0 0 22px rgba(68, 150, 214, 0.56),
                0 0 42px rgba(98, 105, 186, 0.32);
            filter: blur(var(--lyric-depth-blur, 0.15px));
            transform-style: preserve-3d;
            backface-visibility: hidden;
            animation-name: lyricDrop, lyricColorFlow;
            animation-timing-function: linear, ease-in-out;
            animation-iteration-count: infinite, infinite;
            will-change: transform, opacity;
        }

        /* --- 动态音波层 --- */
        #dot-grid-layer {
            position: absolute;
            left: 50%;
            top: 50%;
            width: clamp(360px, 55vw, 660px);
            height: clamp(360px, 55vw, 660px);
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            border-radius: 50%;
            background:
                repeating-conic-gradient(
                    from 5deg,
                    rgba(232, 244, 248, 0.78) 0deg 0.7deg,
                    transparent 0.7deg 2.4deg,
                    rgba(111, 176, 196, 0.34) 2.4deg 3deg,
                    transparent 3deg 5.2deg
                );
            -webkit-mask-image: radial-gradient(circle, transparent 0 59%, rgba(0,0,0,0.18) 59.4% 61.8%, #000 62.2% 66.2%, transparent 67% 100%);
            mask-image: radial-gradient(circle, transparent 0 59%, rgba(0,0,0,0.18) 59.4% 61.8%, #000 62.2% 66.2%, transparent 67% 100%);
            mix-blend-mode: screen;
            opacity: 0.38;
            filter: drop-shadow(0 0 22px rgba(191, 237, 247, 0.18));
            animation: audioWaveWide 2.2s ease-in-out infinite;
        }

        #dot-grid-layer::before {
            content: '';
            position: absolute;
            inset: 15%;
            border-radius: 50%;
            border: 1px solid rgba(232, 244, 248, 0.24);
            background:
                radial-gradient(circle, transparent 0 48%, rgba(232, 244, 248, 0.14) 49% 49.4%, transparent 50% 100%);
            mix-blend-mode: screen;
            opacity: 0.76;
            animation: audioInnerDash 2.6s ease-in-out infinite;
        }

        .orb,
        #dot-grid-layer {
            display: none;
        }

        .audio-panel {
            position: absolute;
            left: 50%;
            top: 49%;
            z-index: 0;
            width: clamp(640px, 100vmin, 1120px);
            aspect-ratio: 1;
            transform: translate(-50%, -50%);
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.46;
            pointer-events: none;
            overflow: visible;
        }

        .audio-panel::before {
            display: none;
        }

        .audio-panel-label {
            position: absolute;
            top: 30px;
            z-index: 2;
            font: 700 12px/1 "Courier New", monospace;
            letter-spacing: 2px;
            color: rgba(232, 238, 241, 0.48);
        }

        .audio-panel-label.left { left: 32px; }
        .audio-panel-label.right { right: 32px; }

        .audio-panel-status {
            position: absolute;
            left: 32px;
            right: 32px;
            bottom: 72px;
            z-index: 2;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 20px;
            color: rgba(255, 255, 255, 0.88);
            font: 500 16px/1.35 "Courier New", "PingFang SC", monospace;
        }

        .audio-panel-status span {
            display: block;
            margin-bottom: 10px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(232, 238, 241, 0.48);
        }

        .audio-panel-footer {
            position: absolute;
            left: 32px;
            right: 32px;
            bottom: 30px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            font: 700 12px/1 "Courier New", monospace;
            letter-spacing: 1.5px;
            color: rgba(232, 238, 241, 0.44);
        }

        .audio-wave-svg {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 100%;
            transform: translate(-50%, -50%);
            z-index: 0;
            overflow: visible;
            filter:
                drop-shadow(0 0 7px rgba(228, 241, 246, 0.16))
                drop-shadow(0 0 18px rgba(96, 202, 220, 0.1));
        }

        .audio-wave-svg .audio-ring-line {
            fill: none;
            stroke: rgba(235, 242, 244, 0.68);
            stroke-width: 1.7;
        }

        .audio-wave-svg .audio-ring-dashed {
            fill: none;
            stroke: rgba(235, 242, 244, 0.62);
            stroke-width: 1.35;
            stroke-dasharray: 5 8;
            animation: audioDashSpin 9s linear infinite;
            transform-origin: 300px 300px;
        }

        .audio-spoke {
            stroke: rgba(238, 244, 246, 0.92);
            stroke-width: 3.1;
            stroke-linecap: round;
        }

        .audio-core-dot {
            fill: #ff4b50;
            filter: drop-shadow(0 0 10px rgba(255, 75, 80, 0.7));
            animation: audioSvgCorePulse 1.45s ease-in-out infinite;
            transform-origin: 300px 300px;
        }

        @keyframes audioDashSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes audioSvgCorePulse {
            0%, 100% { transform: scale(0.9); opacity: 0.82; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes flowBlue {
            0%   {
                transform: translate(-18vw, -10vh) scale(1.05, 0.78) rotate(0deg) skew(-8deg, 2deg);
                background-color: rgba(96, 164, 194, 0.46);
                border-radius: 74% 26% 62% 38% / 42% 66% 34% 58%;
            }
            33%  {
                transform: translate(20vw, 34vh) scale(1.42, 0.84) rotate(84deg) skew(10deg, -6deg);
                background-color: rgba(108, 124, 185, 0.4);
                border-radius: 28% 72% 36% 64% / 68% 36% 64% 32%;
            }
            66%  {
                transform: translate(57vw, -20vh) scale(0.78, 1.48) rotate(172deg) skew(-12deg, 7deg);
                background-color: rgba(96, 184, 170, 0.38);
                border-radius: 64% 36% 72% 28% / 28% 54% 46% 72%;
            }
            100% {
                transform: translate(74vw, 13vh) scale(1.18, 0.72) rotate(360deg) skew(6deg, -8deg);
                background-color: rgba(128, 186, 198, 0.44);
                border-radius: 44% 56% 25% 75% / 54% 24% 76% 46%;
            }
        }

        @keyframes flowTeal {
            0%   {
                transform: translate(84vw, 60vh) scale(0.76, 1.34) rotate(0deg) skew(6deg, -10deg);
                background-color: rgba(101, 184, 169, 0.42);
                border-radius: 40% 60% 70% 30% / 30% 64% 36% 70%;
            }
            33%  {
                transform: translate(36vw, 16vh) scale(1.26, 0.72) rotate(-94deg) skew(-12deg, 5deg);
                background-color: rgba(124, 135, 188, 0.34);
                border-radius: 72% 28% 38% 62% / 46% 76% 24% 54%;
            }
            66%  {
                transform: translate(7vw, 73vh) scale(1.48, 0.9) rotate(-188deg) skew(12deg, -3deg);
                background-color: rgba(91, 182, 144, 0.4);
                border-radius: 24% 76% 66% 34% / 62% 32% 68% 38%;
            }
            100% {
                transform: translate(-15vw, 22vh) scale(0.86, 1.42) rotate(-360deg) skew(-8deg, 9deg);
                background-color: rgba(89, 168, 191, 0.42);
                border-radius: 56% 44% 28% 72% / 26% 48% 52% 74%;
            }
        }

        @keyframes flowPurple {
            0%   {
                transform: translate(29vw, 42vh) scale(1.18, 0.78) rotate(0deg) skew(-10deg, 4deg);
                background-color: rgba(130, 122, 181, 0.34);
                border-radius: 64% 36% 42% 58% / 34% 72% 28% 66%;
            }
            33%  {
                transform: translate(70vw, 79vh) scale(1.42, 0.84) rotate(46deg) skew(8deg, -8deg);
                background-color: rgba(174, 113, 166, 0.3);
                border-radius: 34% 66% 28% 72% / 72% 28% 66% 34%;
            }
            66%  {
                transform: translate(-12vw, 8vh) scale(0.72, 1.48) rotate(138deg) skew(-8deg, 10deg);
                background-color: rgba(94, 159, 190, 0.38);
                border-radius: 78% 22% 54% 46% / 44% 36% 64% 56%;
            }
            100% {
                transform: translate(9vw, 82vh) scale(1.44, 0.82) rotate(360deg) skew(12deg, -6deg);
                background-color: rgba(145, 117, 180, 0.34);
                border-radius: 38% 62% 76% 24% / 64% 42% 58% 36%;
            }
        }

        @keyframes flowMagenta {
            0% {
                transform: translate(58vw, -23vh) scale(0.76, 1.34) rotate(0deg) skew(7deg, -9deg);
                background-color: rgba(168, 106, 147, 0.28);
                border-radius: 26% 74% 54% 46% / 62% 32% 68% 38%;
            }
            45% {
                transform: translate(17vw, 56vh) scale(1.38, 0.82) rotate(112deg) skew(-13deg, 5deg);
                background-color: rgba(185, 161, 116, 0.28);
                border-radius: 72% 28% 30% 70% / 34% 66% 34% 66%;
            }
            100% {
                transform: translate(76vw, 67vh) scale(0.82, 1.42) rotate(260deg) skew(8deg, -10deg);
                background-color: rgba(103, 178, 190, 0.34);
                border-radius: 44% 56% 78% 22% / 72% 30% 70% 28%;
            }
        }

        @keyframes auroraSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.08); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes audioHaloBreath {
            0%, 100% { opacity: 0.54; filter: brightness(0.84); }
            45% { opacity: 0.82; filter: brightness(1.18); }
            68% { opacity: 0.66; filter: brightness(0.98); }
        }

        @keyframes audioWaveOuter {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.96) rotate(-2deg);
                opacity: 0.46;
                filter: drop-shadow(0 0 14px rgba(199, 239, 248, 0.16)) brightness(0.9);
            }
            28% {
                transform: translate(-50%, -50%) scale(1.04, 1.0) rotate(2deg);
                opacity: 0.72;
                filter: drop-shadow(0 0 28px rgba(199, 239, 248, 0.28)) brightness(1.2);
            }
            56% {
                transform: translate(-50%, -50%) scale(1.01, 1.08) rotate(-1deg);
                opacity: 0.6;
                filter: drop-shadow(0 0 20px rgba(199, 239, 248, 0.2)) brightness(1.03);
            }
        }

        @keyframes audioWaveWide {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.98) rotate(0deg);
                opacity: 0.26;
            }
            35% {
                transform: translate(-50%, -50%) scale(1.07, 1.02) rotate(3deg);
                opacity: 0.5;
            }
            70% {
                transform: translate(-50%, -50%) scale(1.02, 1.08) rotate(-2deg);
                opacity: 0.34;
            }
        }

        @keyframes audioRingBreath {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.98);
                opacity: 0.38;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.03);
                opacity: 0.68;
            }
        }

        @keyframes audioInnerRing {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.54;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.08);
                opacity: 0.84;
            }
        }

        @keyframes audioCorePulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.9);
                filter: brightness(0.9);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                filter: brightness(1.28);
            }
        }

        @keyframes audioInnerDash {
            0%, 100% {
                transform: scale(0.98) rotate(0deg);
                opacity: 0.44;
            }
            50% {
                transform: scale(1.05) rotate(4deg);
                opacity: 0.82;
            }
        }

        @keyframes lyricDrop {
            0% { transform: translate3d(-5vw, -24vh, var(--lyric-z, 0px)) rotateX(var(--lyric-tilt-x, 0deg)) rotateZ(-4deg) scale(var(--lyric-depth-scale, 1)); opacity: 0; }
            9% { opacity: 0.52; }
            38% { opacity: 0.88; }
            72% { opacity: 0.68; }
            100% { transform: translate3d(4vw, 126vh, var(--lyric-z, 0px)) rotateX(var(--lyric-tilt-x, 0deg)) rotateZ(3deg) scale(var(--lyric-depth-scale, 1)); opacity: 0; }
        }

        @keyframes lyricColorFlow {
            0%, 100% {
                color: rgba(127, 229, 237, 0.78);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 8px rgba(87, 226, 213, 0.72),
                    0 0 22px rgba(68, 150, 214, 0.56),
                    0 0 42px rgba(98, 105, 186, 0.32);
            }
            24% {
                color: rgba(162, 207, 238, 0.74);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 8px rgba(129, 201, 232, 0.68),
                    0 0 24px rgba(81, 136, 207, 0.48),
                    0 0 44px rgba(120, 112, 188, 0.28);
            }
            52% {
                color: rgba(144, 230, 198, 0.74);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 9px rgba(116, 220, 192, 0.66),
                    0 0 25px rgba(71, 163, 173, 0.48),
                    0 0 46px rgba(83, 118, 184, 0.28);
            }
            78% {
                color: rgba(201, 178, 226, 0.66);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 9px rgba(190, 164, 218, 0.54),
                    0 0 24px rgba(128, 108, 183, 0.36),
                    0 0 42px rgba(66, 139, 181, 0.24);
            }
        }

        @keyframes dotDrift {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 44px 88px, -44px 44px; }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.45; filter: brightness(0.78); }
            45% { opacity: 0.72; filter: brightness(1.28); }
            62% { opacity: 0.54; filter: brightness(0.96); }
        }

        @keyframes dotWaveBands {
            0% {
                background-position: 0 0;
                -webkit-mask-position: -180px 180px;
                mask-position: -180px 180px;
            }
            100% {
                background-position: 44px 44px;
                -webkit-mask-position: 180px -180px;
                mask-position: 180px -180px;
            }
        }

        @keyframes dotBandPulse {
            0%, 100% { opacity: 0.12; filter: brightness(0.9); }
            40% { opacity: 0.58; filter: brightness(1.75); }
            72% { opacity: 0.28; filter: brightness(1.1); }
        }

        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* 扫描线效果增加复古感 */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.03) 50%,
                rgba(0,0,0,0.03)
            );
            background-size: 100% 4px;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 5;
        }

        .wish-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            overflow: auto;
            padding: 24px 18px;
            background:
                radial-gradient(circle at 50% 58%, rgba(82, 166, 190, 0.1), transparent 30%),
                rgba(0, 4, 12, 0.38);
            backdrop-filter: blur(1.5px);
        }

        .wish-card-panel {
            --wish-target-x: 180px;
            --wish-target-y: 260px;
            width: min(560px, calc(100vw - 36px));
            max-height: calc(100vh - 48px);
            position: relative;
            overflow: auto;
            border-radius: 7px;
            border: 2px solid rgba(116, 159, 183, 0.86);
            background:
                linear-gradient(180deg, rgba(204, 225, 234, 0.98), rgba(148, 184, 202, 0.98)),
                repeating-linear-gradient(0deg, rgba(4, 19, 32, 0.04) 0 1px, transparent 1px 4px);
            box-shadow:
                inset 2px 2px 0 rgba(235, 251, 255, 0.78),
                inset -3px -5px 0 rgba(64, 103, 128, 0.28),
                0 24px 70px rgba(0, 0, 0, 0.52);
            color: #0b2030;
            transform-origin: center;
            scrollbar-width: thin;
            scrollbar-color: #2a6b86 #b7d2df;
        }

        .wish-card-panel::-webkit-scrollbar { width: 10px; }
        .wish-card-panel::-webkit-scrollbar-track { background: #b7d2df; }
        .wish-card-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4fa3b7, #1c4e6d);
            border: 2px solid #b7d2df;
        }

        .wish-card-panel::before {
            content: '';
            position: absolute;
            inset: 42px 10px 10px;
            border-radius: 5px;
            border: 1px solid rgba(17, 64, 90, 0.26);
            pointer-events: none;
        }

        .wish-card-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(110deg, transparent 0 35%, rgba(255, 255, 255, 0.32) 46%, transparent 58%),
                repeating-linear-gradient(90deg, rgba(0, 70, 92, 0.08) 0 1px, transparent 1px 7px);
            mix-blend-mode: soft-light;
        }

        .wish-card-panel.is-delivering {
            animation: wishPanelVanish 0.42s ease-out forwards;
            pointer-events: none;
        }

        .wish-panel-inner {
            position: relative;
            z-index: 1;
            padding: 0;
        }

        .wish-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin: 0;
            min-height: 42px;
            padding: 8px 10px 8px 16px;
            border-bottom: 2px solid rgba(5, 24, 38, 0.68);
            background:
                linear-gradient(180deg, #2f7ea3 0%, #15506f 46%, #082436 100%),
                repeating-linear-gradient(90deg, rgba(142, 241, 238, 0.08) 0 2px, transparent 2px 8px);
            box-shadow:
                inset 0 1px 0 rgba(202, 247, 255, 0.5),
                0 2px 0 rgba(255, 255, 255, 0.22);
        }

        .wish-panel-title {
            margin: 0;
            font: 900 21px/1.1 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;

            color: rgba(169, 246, 236, 0.42);

        .wish-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .wish-color-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wish-color-control input {
            width: 44px;
            height: 38px;
            border: 1px solid rgba(16, 54, 73, 0.36);
            border-radius: 6px;
            background: #d7e8eb;
            padding: 3px;
            cursor: pointer;
        }

        .wish-color-chip {
            flex: 1;
            min-width: 0;
            height: 38px;
            border-radius: 6px;
            border: 1px solid rgba(16, 54, 73, 0.28);
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.26), 0 4px 12px rgba(0,0,0,0.14);
        }

        .wish-segments {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;

        .wish-segment {
            border: 1px solid rgba(14, 46, 64, 0.34);
            border-radius: 6px;
            background: linear-gradient(180deg, #dcebed, #aabfca);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 2px 0 rgba(28, 56, 70, 0.24);
            color: #17374c;
            cursor: pointer;
            padding: 8px 11px;
            font: 800 13px/1 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .wish-segment.active {
            background: linear-gradient(180deg, #1f5b75, #0a2538);
            color: #8df8ec;
            border-color: rgba(108, 223, 225, 0.72);
            box-shadow:
                inset 0 0 12px rgba(73, 217, 223, 0.22),
                0 0 14px rgba(73, 217, 223, 0.18);
        }

        .wish-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 0;
            padding: 16px 20px 18px;
        }

        .wish-action {
            border: 1px solid rgba(14, 46, 64, 0.38);
            border-radius: 6px;
            padding: 10px 16px;
            font: 900 14px/1 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.72), 0 4px 0 rgba(18, 44, 58, 0.26);
        }

        .wish-action.secondary {
            background: linear-gradient(180deg, #e7f0f1, #aebec6);
            color: #17364a;
        }

        .wish-action.primary {

        }

        .wish-delivered {

            background: rgba(4, 18, 30, 0.76);
            color: #98f8ef;

            top: 50vh;
            z-index: 66;

            height: 138px;
            pointer-events: none;
            border-radius: 8px;
            border: 2px solid rgba(156, 236, 234, 0.78);
            color: #b9fff4;
            background:
                linear-gradient(140deg, var(--wish-card-color), rgba(7, 31, 45, 0.96) 54%, #04121f),
                repeating-linear-gradient(0deg, rgba(157, 255, 244, 0.14) 0 1px, transparent 1px 5px);
            box-shadow:
                inset 1px 1px 0 rgba(239, 255, 255, 0.52),
                inset -4px -5px 0 rgba(0, 13, 24, 0.34),
                0 0 28px rgba(91, 230, 222, 0.2),
                0 18px 42px rgba(0, 0, 0, 0.46);
            transform-origin: center;
            animation: wishInsertCard 1.04s cubic-bezier(.21,.84,.24,1) forwards;
        }

        .wish-insert-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                linear-gradient(115deg, rgba(255,255,255,0.28), transparent 34%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.1) 0 1px, transparent 1px 4px);
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .wish-insert-card-title {
            position: absolute;
            left: 12px;
            right: 12px;
            top: 10px;
            font: 900 13px/1 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #a8fff1;
            text-shadow: 0 0 8px rgba(89, 239, 228, 0.76);
        }

        .wish-insert-card-line {
            position: absolute;
            left: 12px;
            right: 12px;
            top: 37px;
            min-height: 46px;
            border-radius: 5px;
            padding: 8px 9px;
            overflow: hidden;
            background: rgba(1, 9, 16, 0.68);
            font: 900 13px/1.25 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #c2fff6;
        }

        .wish-insert-card-tags {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 12px;
            display: flex;
            gap: 6px;
            overflow: hidden;
            white-space: nowrap;
        }

        .wish-insert-card-tags span {
            flex: 0 0 auto;
            border-radius: 999px;
            border: 1px solid rgba(145, 238, 232, 0.42);
            background: rgba(3, 16, 27, 0.72);
            padding: 4px 8px;
            font: 800 10px/1 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: rgba(202, 255, 248, 0.84);
        }

        .knob-turn-hint {

            --knob-hint-y: 48vh;

            left: var(--knob-hint-x);
            top: var(--knob-hint-y);
            z-index: 62;
            width: 174px;
            height: 164px;
            pointer-events: none;
            transform: translate(-92px, -128px);
            filter: drop-shadow(0 12px 22px rgba(0, 0, 0, 0.44));

        .knob-turn-hint::before {
            display: none;
        }

        .knob-turn-hint::after {
            display: none;
        }

            left: 0;
            top: 0;

            border: 2px solid rgba(121, 239, 232, 0.82);

            background:
                repeating-linear-gradient(0deg, rgba(127, 255, 238, 0.08) 0 1px, transparent 1px 5px),
                linear-gradient(180deg, rgba(3, 17, 28, 0.96), rgba(0, 9, 16, 0.98));
            color: #9dfff3;
            padding: 8px 10px;
            font: 900 13px/1.25 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
            text-align: center;
            text-shadow: 0 0 9px rgba(82, 255, 235, 0.82);
            box-shadow:
                inset 0 0 11px rgba(60, 235, 222, 0.16),
                0 0 18px rgba(83, 227, 225, 0.24);
        }

            display: block;
            margin-top: 3px;
            font-size: 10px;
            color: rgba(181, 255, 248, 0.72);
        }

            justify-content: center;

            justify-items: center;

        .result-card-shell::after {
            display: none;

            display: block;

            border-radius: 2px;

            top: -12px;

            width: 34px;
            height: 34px;
            border-radius: 6px;

            cursor: pointer;
            font: 900 20px/1 "Courier New", monospace;
        }

            border-radius: 8px;
            border: 6px solid #2b6f94;
            background:
                repeating-linear-gradient(0deg, rgba(127, 255, 238, 0.08) 0 1px, transparent 1px 5px),
                repeating-linear-gradient(90deg, rgba(127, 255, 238, 0.06) 0 1px, transparent 1px 8px),
                linear-gradient(180deg, rgba(3, 17, 28, 0.97), rgba(0, 9, 16, 0.98));
            color: #9dfff3;
            padding: 8px 20px;
            text-align: center;
            text-decoration: none;
            font: 900 14px/1 "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif;
            text-shadow:
                0 0 7px rgba(82, 255, 235, 0.88),
                0 0 16px rgba(82, 255, 235, 0.42);
            box-shadow:
                inset 0 0 10px rgba(60, 235, 222, 0.14),
                0 0 0 1px rgba(5, 27, 42, 0.88),
                0 3px 0 rgba(2, 18, 31, 0.72),
                0 0 18px rgba(83, 227, 225, 0.2),
                0 14px 34px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(8px);
            overflow: hidden;
            appearance: none;
            cursor: pointer;
        }

        .result-card-save::before {
            display: none;
        }

        @keyframes wishPanelVanish {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: brightness(1);
            }
            100% {
                opacity: 0.18;
                transform: scale(0.96);
                filter: brightness(0.78) blur(1.2px);
            }
        }

        @keyframes wishInsertCard {
            0% {
                transform: translate3d(-50%, -50%, 0) scale(0.98) rotate(-3deg);
                opacity: 0;
                filter: brightness(1.06);
            }
            18% {
                opacity: 1;
            }
            66% {
                transform: translate3d(calc(-50% + var(--wish-target-x) * 0.74), calc(-50% + var(--wish-target-y) * 0.72), 0) scale(0.46) rotate(8deg);
                opacity: 0.96;
                filter: brightness(1.18);
            }
            100% {
                transform: translate3d(calc(-50% + var(--wish-target-x)), calc(-50% + var(--wish-target-y)), 0) scale(0.08) rotate(16deg);
                opacity: 0;
                filter: brightness(1.9) blur(0.4px);
            }
        }

        @keyframes deliveredBlink {
            0% { opacity: 0; transform: translateY(10px); }
            20%, 72% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(6px); }
        }

        @keyframes knobArrowPulse {
            from { opacity: 0.58; filter: brightness(0.9); }
            to { opacity: 1; filter: brightness(1.45); }
        }

        @keyframes resultOverlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes resultCardExpand {
            0% {
                opacity: 0;
                transform: translate3d(-10vw, 18vh, 0) scale(0.28) rotate(-7deg);
                filter: brightness(1.8) blur(0.5px);
            }
            100% {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1) rotate(0deg);
                filter: brightness(1);
            }
        }

        @media (max-width: 640px) {
            .wish-overlay { align-items: flex-start; padding-top: 24px; }
            .wish-row { grid-template-columns: 1fr; }
            .wish-panel-title { font-size: 20px; }
            .wish-actions { justify-content: stretch; }
            .wish-action { flex: 1; }
        }

        @media (min-width: 641px) {
            .lyric-line {
                font-size: clamp(28px, var(--lyric-size-desktop, 3.6vw), 76px);
            }
        }
    </style>
